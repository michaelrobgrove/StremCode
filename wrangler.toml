/**
 * StremCodes - Stremio Protocol Builders v1.2
 *
 * Key change: stream matching now uses TMDB ID lookup via IMDB→TMDB
 * conversion for reliable matching. Fuzzy text matching is a fallback only.
 */

export function buildManifest(origin, token) {
  return {
    id: 'community.stremcodes',
    version: '1.2.0',
    name: 'StremCodes',
    description: 'Your Xtream Codes IPTV library in Stremio. Streams appear on every matching title alongside Torrentio and other addons.',
    logo: `${origin}/logo.png`,
    background: `${origin}/bg.png`,
    types: ['movie', 'series'],
    catalogs: [
      {
        type: 'movie',
        id: 'xc_vod_all',
        name: '📼 XC Movies',
        extra: [
          { name: 'search', isRequired: false },
          { name: 'skip', isRequired: false },
        ],
      },
      {
        type: 'series',
        id: 'xc_series_all',
        name: '📺 XC Series',
        extra: [
          { name: 'search', isRequired: false },
          { name: 'skip', isRequired: false },
        ],
      },
    ],
    resources: [
      {
        name: 'catalog',
        types: ['movie', 'series'],
        idPrefixes: ['xc_'],
      },
      {
        name: 'meta',
        types: ['movie', 'series'],
        idPrefixes: ['xc_'],
      },
      {
        // Respond to IMDB IDs (tt...) AND our own xc_ IDs
        name: 'stream',
        types: ['movie', 'series'],
        idPrefixes: ['tt', 'kitsu', 'xc_'],
      },
    ],
    idPrefixes: ['xc_'],
    behaviorHints: {
      configurable: false,
      configurationRequired: false,
    },
  };
}

// ─── Catalog ─────────────────────────────────────────────────────────────────

const PAGE_SIZE = 100;

export async function buildCatalog(client, type, catalogId, skip = 0, search = '') {
  if (type === 'movie') return buildVodCatalog(client, catalogId, skip, search);
  if (type === 'series') return buildSeriesCatalog(client, catalogId, skip, search);
  return [];
}

async function buildVodCatalog(client, catalogId, skip, search) {
  const categoryId = catalogId.replace('xc_vod_', '') === 'all'
    ? null : catalogId.replace('xc_vod_', '');
  let streams = await client.getVodStreams(categoryId);
  if (!Array.isArray(streams)) streams = [];
  if (search) {
    const q = search.toLowerCase();
    streams = streams.filter(s => s.name && s.name.toLowerCase().includes(q));
  }
  return streams.slice(skip, skip + PAGE_SIZE).map(s => xcVodToMeta(s));
}

async function buildSeriesCatalog(client, catalogId, skip, search) {
  const categoryId = catalogId.replace('xc_series_', '') === 'all'
    ? null : catalogId.replace('xc_series_', '');
  let series = await client.getSeriesList(categoryId);
  if (!Array.isArray(series)) series = [];
  if (search) {
    const q = search.toLowerCase();
    series = series.filter(s => s.name && s.name.toLowerCase().includes(q));
  }
  return series.slice(skip, skip + PAGE_SIZE).map(s => xcSeriesToMeta(s));
}

// ─── Meta ─────────────────────────────────────────────────────────────────────

export async function buildMeta(client, type, id) {
  if (type === 'movie') {
    const vodId = id.replace('xc_vod_', '');
    let info;
    try { info = await client.getVodInfo(vodId); } catch { return null; }
    if (!info || !info.movie_data) return null;
    return xcVodInfoToFullMeta(id, info);
  }
  if (type === 'series') {
    const seriesId = id.replace('xc_series_', '');
    let info;
    try { info = await client.getSeriesInfo(seriesId); } catch { return null; }
    if (!info || !info.info) return null;
    return xcSeriesInfoToFullMeta(id, info);
  }
  return null;
}

// ─── Streams ──────────────────────────────────────────────────────────────────

export async function buildStream(client, type, id) {
  if (id.startsWith('xc_')) {
    return buildStreamForXcId(client, type, id);
  }
  if (id.startsWith('tt') || id.startsWith('kitsu')) {
    return buildStreamForImdbId(client, type, id);
  }
  return [];
}

async function buildStreamForXcId(client, type, id) {
  if (type === 'movie') {
    const vodId = id.replace('xc_vod_', '');
    let ext = 'mkv';
    try {
      const info = await client.getVodInfo(vodId);
      if (info?.movie_data?.container_extension) ext = info.movie_data.container_extension;
    } catch {}
    return [{
      url: client.getVodStreamUrl(vodId, ext),
      name: 'StremCodes',
      description: `XC · ${ext.toUpperCase()}`,
      behaviorHints: { notWebReady: ext !== 'mp4', bingeGroup: 'stremcodes' },
    }];
  }
  if (type === 'series') {
    const ep = id.replace('xc_ep_', '');
    const parts = ep.split('_');
    const streamId = parts[0];
    const ext = parts[1] || 'mkv';
    return [{
      url: client.getSeriesStreamUrl(streamId, ext),
      name: 'StremCodes',
      description: `XC · ${ext.toUpperCase()}`,
      behaviorHints: { notWebReady: ext !== 'mp4', bingeGroup: 'stremcodes' },
    }];
  }
  return [];
}

/**
 * IMDB ID → TMDB ID → match against XC library by tmdb field
 *
 * Series ID format from Stremio: tt2805096:7:1  (imdbId:season:episode)
 * Movie ID format:                tt1234567
 */
async function buildStreamForImdbId(client, type, id) {
  let imdbId = id;
  let season = null;
  let episode = null;

  if (type === 'series' && id.includes(':')) {
    const parts = id.split(':');
    imdbId = parts[0];
    season = parseInt(parts[1]);
    episode = parseInt(parts[2]);
  }

  // Step 1: resolve IMDB → TMDB id
  const tmdbId = await imdbToTmdbId(imdbId, type);

  if (type === 'movie') {
    return matchVodByTmdb(client, tmdbId, imdbId);
  }

  if (type === 'series' && season !== null && episode !== null) {
    return matchSeriesByTmdb(client, tmdbId, imdbId, season, episode);
  }

  return [];
}

/**
 * Convert IMDB ID to TMDB ID using Cinemeta (no API key needed).
 * Returns a TMDB ID string, or a fallback object { name, year, fallback: true }
 * if TMDB ID isn't available but we got a title.
 */
async function imdbToTmdbId(imdbId, type) {
  try {
    const cinemetaType = type === 'series' ? 'series' : 'movie';
    const url = `https://v3-cinemeta.strem.io/meta/${cinemetaType}/${imdbId}.json`;
    const res = await fetch(url, {
      headers: { 'User-Agent': 'StremCodes/1.2' },
      signal: AbortSignal.timeout(8000),
    });
    if (!res.ok) return null;
    const data = await res.json();
    const meta = data?.meta;
    if (!meta) return null;

    // Try direct tmdb field
    if (meta.tmdb_id) return String(meta.tmdb_id);

    // Try links array: { url: 'https://www.themoviedb.org/movie/12345' }
    if (Array.isArray(meta.links)) {
      for (const link of meta.links) {
        const m = link.url?.match(/themoviedb\.org\/(movie|tv)\/(\d+)/);
        if (m) return m[2];
      }
    }

    // No TMDB id found — return name/year for fuzzy fallback
    return { name: meta.name, year: meta.year, fallback: true };
  } catch {
    return null;
  }
}

/**
 * Match VOD stream by TMDB id.
 * Falls back to fuzzy title match if no TMDB id available.
 */
async function matchVodByTmdb(client, tmdbIdOrFallback, imdbId) {
  let streams;
  try { streams = await client.getVodStreams(); } catch { return []; }
  if (!Array.isArray(streams)) return [];

  // TMDB ID match (most reliable)
  if (tmdbIdOrFallback && typeof tmdbIdOrFallback === 'string') {
    const tmdbId = tmdbIdOrFallback;
    const matches = streams.filter(s => s.tmdb && String(s.tmdb) === tmdbId);
    if (matches.length > 0) {
      return matches.map(s => {
        const ext = s.container_extension || 'mkv';
        return {
          url: client.getVodStreamUrl(s.stream_id, ext),
          name: 'StremCodes',
          description: `XC · ${cleanName(s.name)} · ${ext.toUpperCase()}`,
          behaviorHints: { notWebReady: ext !== 'mp4', bingeGroup: 'stremcodes' },
        };
      });
    }
    // TMDB matched nothing — fall through to fuzzy
  }

  // Fallback: fuzzy title match
  if (tmdbIdOrFallback?.fallback) {
    return matchVodByTitle(streams, client, tmdbIdOrFallback.name, tmdbIdOrFallback.year);
  }

  return [];
}

/**
 * Match series by TMDB id, then find the right episode.
 */
async function matchSeriesByTmdb(client, tmdbIdOrFallback, imdbId, season, episode) {
  let seriesList;
  try { seriesList = await client.getSeriesList(); } catch { return []; }
  if (!Array.isArray(seriesList)) return [];

  let bestMatch = null;

  // TMDB ID match
  if (tmdbIdOrFallback && typeof tmdbIdOrFallback === 'string') {
    const tmdbId = tmdbIdOrFallback;
    bestMatch = seriesList.find(s => s.tmdb && String(s.tmdb) === tmdbId);
  }

  // Fallback: fuzzy title match
  if (!bestMatch && tmdbIdOrFallback?.fallback) {
    const needle = normalizeTitle(tmdbIdOrFallback.name);
    const candidates = seriesList.filter(s => {
      if (!s.name) return false;
      const hay = normalizeTitle(s.name);
      return hay === needle || hay.includes(needle) || needle.includes(hay);
    });
    if (candidates.length > 0) {
      const scored = candidates
        .map(s => ({ s, score: titleSimilarity(normalizeTitle(s.name), needle) }))
        .sort((a, b) => b.score - a.score);
      bestMatch = scored[0].s;
    }
  }

  if (!bestMatch) return [];

  let info;
  try { info = await client.getSeriesInfo(bestMatch.series_id); } catch { return []; }

  const eps = info?.episodes || {};
  const seasonEps =
    eps[String(season)] ||
    eps[String(season).padStart(2, '0')] ||
    [];

  if (!Array.isArray(seasonEps)) return [];

  const ep = seasonEps.find(e => parseInt(e.episode_num) === episode);
  if (!ep) return [];

  const ext = ep.container_extension || 'mkv';
  return [{
    url: client.getSeriesStreamUrl(ep.id, ext),
    name: 'StremCodes',
    description: `XC · S${String(season).padStart(2,'0')}E${String(episode).padStart(2,'0')} · ${ext.toUpperCase()}`,
    behaviorHints: { notWebReady: ext !== 'mp4', bingeGroup: 'stremcodes' },
  }];
}

/**
 * Pure title-based fuzzy match for VOD (used as fallback only)
 */
function matchVodByTitle(streams, client, titleName, titleYear) {
  const needle = normalizeTitle(titleName);

  const candidates = streams.filter(s => {
    if (!s.name) return false;
    const hay = normalizeTitle(s.name);
    if (hay === needle) return true;
    if (titleYear && s.year && String(s.year) !== String(titleYear)) return false;
    return hay.includes(needle) || needle.includes(hay);
  });

  if (candidates.length === 0) return [];

  const scored = candidates
    .map(s => ({ s, score: titleSimilarity(normalizeTitle(s.name), needle) }))
    .sort((a, b) => b.score - a.score);

  return scored.slice(0, 3).map(({ s }) => {
    const ext = s.container_extension || 'mkv';
    return {
      url: client.getVodStreamUrl(s.stream_id, ext),
      name: 'StremCodes',
      description: `XC · ${cleanName(s.name)} · ${ext.toUpperCase()}`,
      behaviorHints: { notWebReady: ext !== 'mp4', bingeGroup: 'stremcodes' },
    };
  });
}

// ─── XC → Stremio converters ──────────────────────────────────────────────────

function xcVodToMeta(stream) {
  return {
    id: `xc_vod_${stream.stream_id}`,
    type: 'movie',
    name: cleanName(stream.name),
    poster: stream.stream_icon || null,
    posterShape: 'poster',
    genres: stream.category_name ? [stream.category_name] : undefined,
    description: stream.plot || undefined,
    year: stream.year ? parseInt(stream.year) : undefined,
    imdbRating: stream.rating ? parseFloat(stream.rating) : undefined,
  };
}

function xcSeriesToMeta(series) {
  return {
    id: `xc_series_${series.series_id}`,
    type: 'series',
    name: cleanName(series.name),
    poster: series.cover || null,
    posterShape: 'poster',
    genres: series.category_name ? [series.category_name] : undefined,
    description: series.plot || undefined,
    year: series.releaseDate ? parseInt(series.releaseDate) : undefined,
    imdbRating: series.rating ? parseFloat(series.rating) : undefined,
  };
}

function xcVodInfoToFullMeta(id, info) {
  const d = info.movie_data;
  const i = info.info || {};
  return {
    id, type: 'movie',
    name: cleanName(d.name || i.name),
    poster: i.movie_image || d.stream_icon || null,
    background: i.backdrop_path?.[0] || null,
    posterShape: 'poster',
    description: i.plot || d.plot || null,
    year: i.releasedate ? parseInt(i.releasedate) : undefined,
    imdbRating: i.rating ? parseFloat(i.rating) : undefined,
    runtime: i.duration || null,
    genres: i.genre ? i.genre.split(', ') : undefined,
    director: i.director ? [i.director] : undefined,
    cast: i.cast ? i.cast.split(',').map(s => s.trim()) : undefined,
    trailerStreams: i.youtube_trailer ? [{ title: 'Trailer', ytId: i.youtube_trailer }] : undefined,
    links: i.tmdb_id ? [{ name: 'TMDB', category: 'TMDB', url: `https://www.themoviedb.org/movie/${i.tmdb_id}` }] : undefined,
  };
}

function xcSeriesInfoToFullMeta(id, info) {
  const i = info.info || {};
  const eps = info.episodes || {};
  const videos = [];
  for (const [seasonNum, episodes] of Object.entries(eps)) {
    if (!Array.isArray(episodes)) continue;
    for (const ep of episodes) {
      const ext = ep.container_extension || 'mkv';
      videos.push({
        id: `xc_ep_${ep.id}_${ext}`,
        title: ep.title || `S${seasonNum}E${ep.episode_num}`,
        season: parseInt(seasonNum),
        episode: parseInt(ep.episode_num),
        thumbnail: ep.info?.movie_image || null,
        overview: ep.info?.plot || null,
        released: ep.info?.releasedate ? new Date(ep.info.releasedate).toISOString() : undefined,
      });
    }
  }
  videos.sort((a, b) => a.season !== b.season ? a.season - b.season : a.episode - b.episode);
  return {
    id, type: 'series',
    name: cleanName(i.name),
    poster: i.cover || null,
    background: i.backdrop_path?.[0] || null,
    posterShape: 'poster',
    description: i.plot || null,
    year: i.releaseDate ? parseInt(i.releaseDate) : undefined,
    imdbRating: i.rating ? parseFloat(i.rating) : undefined,
    genres: i.genre ? i.genre.split(', ') : undefined,
    cast: i.cast ? i.cast.split(',').map(s => s.trim()) : undefined,
    director: i.director ? [i.director] : undefined,
    videos,
  };
}

// ─── Helpers ──────────────────────────────────────────────────────────────────

function cleanName(name) {
  if (!name) return 'Unknown';
  return name
    .replace(/\b(4K|1080p|720p|480p|HDR|SDR|HEVC|x265|x264|AAC|AC3|BluRay|WEBRip|REPACK)\b/gi, '')
    .replace(/\[.*?\]/g, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function normalizeTitle(name) {
  return cleanName(name)
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, '')
    .replace(/\b(the|a|an)\b/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function titleSimilarity(a, b) {
  if (a === b) return 1;
  const longer = a.length > b.length ? a : b;
  const shorter = a.length > b.length ? b : a;
  if (longer.length === 0) return 1;
  return (longer.length - levenshtein(longer, shorter)) / longer.length;
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) =>
    Array.from({ length: n + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0)
  );
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}
