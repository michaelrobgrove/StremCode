name = "stremcodes"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "public"

# Optional: KV namespace for caching TMDB->stream_id mappings
# Create with: wrangler kv:namespace create "STREAM_CACHE"
# Then uncomment and fill in your namespace id:
# [[kv_namespaces]]
# binding = "STREAM_CACHE"
# id = "your-kv-namespace-id-here"

# Optional: KV namespace for rate limiting
# Create with: wrangler kv:namespace create "RATE_LIMITER"
# [[kv_namespaces]]
# binding = "RATE_LIMITER"
# id = "your-kv-namespace-id-here"
